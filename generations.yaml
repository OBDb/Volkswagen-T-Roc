generations:
  - name: "First Generation"
    start_year: 2017
    end_year: 2025
    description: "The Volkswagen T-Roc is a subcompact crossover SUV based on the Volkswagen Group MQB A1 platform, unveiled at the 2017 Frankfurt Motor Show and launched in November 2017. Positioned between the smaller T-Cross and larger Tiguan, it features a coupe-like roofline and distinctive styling. A significant facelift was introduced in November 2021, updating exterior styling and interior materials. The vehicle offers turbocharged petrol engines (1.0L to 2.0L TSI) and diesel options (1.6L and 2.0L TDI), available with front-wheel drive or 4MOTION all-wheel drive. The high-performance T-Roc R variant, launched in February 2019, features a 2.0-litre turbocharged engine producing 300 horsepower. The T-Roc Cabriolet, a convertible variant, debuted in April 2020 and was assembled in Osnabrück, Germany. Production ended in 2025 as the second generation launched."
  - name: "Second Generation"
    start_year: 2025
    end_year: null
    description: "The second-generation T-Roc was officially presented on August 27, 2025, and entered production in November 2025. Built on the MQB Evo platform (shared with Golf Mk8.5), it features updated design and technology. The platform was updated from the first generation's MQB A1 to accommodate new powertrain options and advanced features."
